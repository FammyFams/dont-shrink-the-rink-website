  <!-- Lace bow at top -->
  <path d="M244 132 C236 126 228 128 232 134 C228 128 224 132 230 138" stroke="#2B6080" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M252 132 C260 126 268 128 264 134 C268 128 272 132 266 138" stroke="#2B6080" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Heel definition -->
  <path d="M185 268 C182 275 180 285 185 295 L190 310" stroke="#BBDAED" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Blade mount plate -->
  <rect x="170" y="330" width="195" height="8" rx="4" fill="#e0e0e0"/>

  <!-- Blade - elegant curved figure skating blade -->
