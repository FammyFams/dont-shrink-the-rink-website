  <!-- Sparkle accents -->
  <g fill="#94E0B9" opacity="0.8">
    <polygon points="380,120 383,128 391,131 383,134 380,142 377,134 369,131 377,128"/>
    <polygon points="130,180 132,186 138,188 132,190 130,196 128,190 122,188 128,186" transform="scale(0.8) translate(20,30)"/>
    <polygon points="400,220 402,226 408,228 402,230 400,236 398,230 392,228 398,226" transform="scale(0.7) translate(100,50)"/>
