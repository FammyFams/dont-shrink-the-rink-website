    C178 255 180 262 185 268
    L185 285
    C175 290 168 300 168 312
    L168 318
    C168 326 174 332 182 333
    L340 345
    C358 346 372 336 375 320
    L377 310
    C378 298 368 288 356 286
    L270 278
    L300 115
