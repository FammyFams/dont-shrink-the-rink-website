  <path d="M210 125 Q205 170 195 220" stroke="#BBDAED" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M290 125 Q285 170 275 220" stroke="#BBDAED" stroke-width="3" fill="none" stroke-linecap="round"/>

