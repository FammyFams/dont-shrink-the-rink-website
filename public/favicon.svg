  <circle cx="236" cy="158" r="3" fill="#2B6080"/>
  <circle cx="256" cy="158" r="3" fill="#2B6080"/>
  <line x1="236" y1="158" x2="256" y2="158" stroke="#2B6080" stroke-width="2"/>

  <circle cx="234" cy="176" r="3" fill="#2B6080"/>
  <circle cx="254" cy="176" r="3" fill="#2B6080"/>
  <line x1="234" y1="176" x2="254" y2="176" stroke="#2B6080" stroke-width="2"/>

  <circle cx="232" cy="194" r="3" fill="#2B6080"/>
  <circle cx="252" cy="194" r="3" fill="#2B6080"/>
  <line x1="232" y1="194" x2="252" y2="194" stroke="#2B6080" stroke-width="2"/>

  <circle cx="230" cy="212" r="3" fill="#2B6080"/>
