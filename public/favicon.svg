<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#2B6080"/>

  <!-- Figure skate boot - feminine style with higher heel and sleek shape -->
  <!-- Boot body -->
  <path d="
    M220 100
    C215 100 208 105 206 115
